<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeacademy Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="login-container">
        <div class="header">
            <h2>Login to Codeacademy</h2>
        </div>
        <form action="">
            <label for="">Email or Username</label> 
            <input type="text" name="" id="">
            <label for="">Password</label> 
            <input type="password" name="" id="">
            <a href="#"> I forgot my password</a>
            <input type="submit" value="Log In">
        </form>
    <footer>
        <h3>Login with another account</h3>
        <div class="images">
            <img src="images/Facebook-Logo.png" alt="facebook logo">
            <img src="images/G logo.png" alt="google logo">
            <img src="images/github logo.png" alt="github logo">
            <img src="images/Twitter Logo.svg.png" alt="twitter logo">
            <img src="images/linkedIn Logo.avif" alt="linkedIn logo">
        </div>
        <a href="#">Not a member yet? <span>Sign up free</span></a>
    </footer>
    </section>
</body>
</html>
