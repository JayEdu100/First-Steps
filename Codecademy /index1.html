<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeacademy Login Page</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <section>
        <h2>Login to Codecademy</h2>
        <form action="">
            <label for="username">Email or Username:</label>
            <input type="text" name="username" required>
            <label for="password">Password</label>
            <input type="password" name="password" required>
            <a href="#">I forgot my password</a>
            <button type="submit">Log In</button>
        </form>
        <p> Login with another account</p>
        <div class="gateways">
            <img src="images/Facebook-Logo.png">
            <img src="images/G logo.png">
            <img src="images/github logo.png">
            <img src="images/Twitter Logo.svg.png">
            <img src="images/linkedIn Logo.avif">
        </div>
        <a href="#">Not a member yet? <span>Sign up free</span></a>
    </section>
</body>
</html>
