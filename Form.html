<!DOCTYPE html>
<link rel="stylesheet" href=".style.css">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Page</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
     <!-- This is the Header/Navigation of the website -->
    <header>
        <h1>Welcome to the Website</h1>
        <nav>
            <ul>
                <li><a href="Home.html">Home</a></li>
                <li><a href="About.html">About</a></li>
                <li><a href="Form.html">Form</a></li>
            </ul>
        </nav>
    </header>
    
     <!--This is the Main Content of the website -->

    <main>
        <h2>Form Inputs</h2>
        <form>
            <div>
                <label for="name">Text Input:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name">
            </div>

            <div>
                <label for="email">Email Input:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
            </div>

            <div>
                <label for="password">Password Input:</label>
                <input type="password" id="password" name="password" placeholder="Enter password">
            </div>

            <div>
                <label for="age">Number Input:</label>
                <input type="number" id="age" name="age" placeholder="Enter your age">
            </div>

            <div>
                <label for="dob">Date Input:</label>
                <input type="date" id="dob" name="dob">
            </div>

            <div>
                <label for="time">Time Input:</label>
                <input type="time" id="time" name="time">
            </div>

            <div>
                <label for="color">Color Input:</label>
                <input type="color" id="color" name="color">
            </div>

            <div>
                <label for="country">Select Dropdown:</label>
                <select id="country" name="country">
                    <option>Select a country</option>
                    <option>USA</option>
                    <option>Canada</option>
                    <option>UK</option>
                </select>
            </div>

            <div>
                <label>Radio Buttons:</label>
                <input type="radio" name="gender" value="male"> Male
                <input type="radio" name="gender" value="female"> Female
            </div>

            <div>
                <label>Checkboxes:</label>
                <input type="checkbox" name="terms"> I agree to terms
                <input type="checkbox" name="newsletter"> Subscribe to newsletter
            </div>

            <div>
                <label for="message">Textarea:</label>
                <textarea id="message" name="message" rows="4" placeholder="Enter your message"></textarea>
            </div>

            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </form>
    </main>

    <!--This is the Footer of the website -->
    <footer>
        <p>&copy; 2024 My Website. All rights reserved.</p>
    </footer>
</body>
</html>
